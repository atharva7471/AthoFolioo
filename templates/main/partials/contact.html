<section class="contact" id="contact" data-aos="fade-up"
    data-aos-duration="1500">
    <h1 class="section-title">Get In Touch</h1>

    <p class="contact-intro">
        I'm currently open to new opportunities and collaborations. Whether
        you
        have a project in mind, a question, or just want to say hi, my inbox
        is
        always open. Would love your feedback, reviews, and suggestions too!
    </p>

    <form class="contact-form" id="commentForm" method="POST"
        action="{{ url_for('submit') }}">
        <input
            type="text"
            id="name"
            name="name"
            placeholder="Your Name"
            required />
        <input
            type="email"
            id="email"
            name="email"
            placeholder="Your Email"
            required />
        <textarea
            name="message"
            id="message"
            placeholder="Your Message"
            rows="5"
            required></textarea>
        <button type="submit" class="btn-primary">Send Message</button>
    </form>

    <div class="social-links">
        <a
            href="https://www.linkedin.com/in/atharva-bhosale-7471abc"
            target="_blank"
            aria-label="LinkedIn">
            <i class="bi bi-linkedin"></i>
        </a>
        <a
            href="https://github.com/atharva7471"
            target="_blank"
            aria-label="GitHub">
            <i class="bi bi-github"></i>
        </a>
        <a
            href="https://mail.google.com/mail/?view=cm&fs=1&to=atharva7471@gmail.com"
            target="_blank"
            aria-label="Email">
            <i class="bi bi-envelope-fill"></i>
        </a>
        <a
            href="https://www.instagram.com/atharva_7471/"
            target="_blank"
            aria-label="Instagram">
            <i class="bi bi-instagram"></i>
        </a>
    </div>

    <!-- ================== User Comments Slider ================== -->
    <section id="comments" class="comments-section">
        <h1 class="section-title">User Comments</h1>

        <div class="slider-container">
            <div class="testimonial-slider" id="commentsContainer">
                <!-- Slides will be injected here -->
            </div>

            <div class="slider-controls">
                <button class="slider-prev" aria-label="Previous comment">
                    <i class="bi bi-chevron-left"></i>
                </button>
                <div class="slider-dots" id="sliderDots"></div>
                <button class="slider-next" aria-label="Next comment">
                    <i class="bi bi-chevron-right"></i>
                </button>
            </div>
        </div>
    </section>
</section>
<script>
      window.API = {
        comments: "{{ url_for('get_comments') }}",
        submit: "{{ url_for('submit') }}"
      };
</script>
