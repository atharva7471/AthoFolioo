<section class="hero" id="home">
    <!-- Interactive Canvas Background -->
    <canvas id="heroCanvas"></canvas>
    <!-- Cursor spotlight -->
    <div class="hero-spotlight" id="heroSpotlight"></div>

    <div class="hero-head">
        <div class="hero-text">
            <h6>I Build things where,</h6>
            <h1>Machine Learning meets<span> Web Applications</span></h1>
            <p>Code is my canvas, logic is my fuel.</p>
            <p>Full-stack explorer. Python whisperer.</p>
            <p>Training models, crafting UI, and chasing clean architecture.</p>
            <h2>And I'm a <span class="text"></span></h2>
        </div>

        <div class="image-wrapper">
            <div class="blob"></div>
            <!-- Lottie Animation -->
            <div class="animation-wrapper">
                <lottie-player
                    src="{{ url_for('static', filename='assets/images/profile/Webdesign.json') }}"
                    background="transparent"
                    speed="0.75"
                    loop
                    autoplay>
                </lottie-player>
            </div>
        </div>
    </div>
    <div class="hero-tail">
        <!-- Buttons : View my work and download -->
        <div class="hero-buttons">
            <a href="#projects" class="btn-primary">View My Work</a>
            <a href="{{ url_for('static', filename='assets/resume.pdf') }}"
                class="btn-secondary">Download CV</a>
        </div>
        <!-- Social Links (Icons) -->
        <div>
            {% include "main/partials/social_links.html" %}
        </div>
    </div>

</section>
