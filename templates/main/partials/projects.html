<!-- ─── Projects Section ─────────────────────────── -->
<section class="projects" id="projects">

  <div class="projects-header" data-aos="fade-up">
    <h1 class="section-title">My Projects</h1>
    <p class="projects-sub">Things I've built — from ML pipelines to full-stack apps</p>
  </div>

  {% if projects %}
  <div class="project-grid">
    {% for project in projects %}
    <article class="project-card"
      data-aos="fade-up"
      data-aos-delay="{{ loop.index0 * 80 }}"
      data-title="{{ project.title }}"
      data-desc="{{ project.description }}"
      data-img="{{ project.image_url }}"
      data-live="{{ project.live_url or '' }}"
      data-github="{{ project.github_url or '' }}"
      data-tech="{{ project.tech_stack | join(',') }}">

      <!-- Thumbnail image -->
      <div class="project-img-wrap">
        <img src="{{ project.image_url }}" alt="{{ project.title }}" loading="lazy">
        <!-- "click to expand" hint -->
        <div class="project-hint"><i class="bi bi-arrows-fullscreen"></i></div>
      </div>

      <!-- Card body (compact) -->
      <div class="project-body">
        <h3 class="project-title">{{ project.title }}</h3>
        <p class="project-desc">{{ project.description }}</p>
        <div class="tech-stack">
          {% for tech in project.tech_stack %}
          <span>{{ tech }}</span>
          {% endfor %}
        </div>
      </div>

    </article>
    {% endfor %}
  </div>
  {% else %}
  <p class="empty-msg">No projects added yet.</p>
  {% endif %}

</section>

<!-- ─── Project Modal ─────────────────────────────── -->
<div id="projectModal" class="proj-modal" role="dialog" aria-modal="true" aria-label="Project details">
  <div class="proj-modal-backdrop"></div>
  <div class="proj-modal-box">

    <button class="proj-modal-close" aria-label="Close">&times;</button>

    <div class="proj-modal-img-wrap">
      <img id="modalImg" src="" alt="">
    </div>

    <div class="proj-modal-body">
      <h2 id="modalTitle"></h2>
      <p id="modalDesc"></p>
      <div id="modalTech" class="tech-stack"></div>
      <div id="modalLinks" class="proj-modal-links"></div>
    </div>

  </div>
</div>
