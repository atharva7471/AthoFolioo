<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- AOS CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <link
      rel="icon"
      type="image/png"
      href="{{ url_for('static', filename='assets/images/profile/letter-a.png') }}" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.css" />
    <link rel="stylesheet"
      href="{{ url_for('static', filename='css/styles.css') }}">
    <title>Atharva | ML | WebDev</title>
    <!-- AOS JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/typed.js@2.0.16/dist/typed.umd.js"></script>
    <!-- lottie-player Animation -->
    <script
      src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
  </head>
  <body>
    <div id="scrollProgress"></div>
    <header>
      {% include "main/partials/navbar.html" %}
    </header>

    {% block hero %}{% endblock %}
    {% block skills %}{% endblock %}
    {% block certificates %}{% endblock %}
    {% block projects %}{% endblock %}
    {% block contact %}{% endblock %}

    <footer class="footer">
      {% include "main/partials/footer.html" %}
    </footer>

    <button id="backToTop" title="Go to top">
      <i class="bi bi-arrow-up"></i>
    </button>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    
    <!-- Vercel Speed Insights -->
    <script>
      window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
  </body>
</html>
