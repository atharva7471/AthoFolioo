<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Atharva Bhosale — ML Engineer &amp; Full-Stack Developer. Explore my projects, skills, and certifications." />
    <meta name="author" content="Atharva Bhosale" />
    <meta property="og:title" content="Atharva Bhosale | ML &amp; Web Dev Portfolio" />
    <meta property="og:description" content="Machine Learning meets Web Applications — projects, skills, and certifications by Atharva Bhosale." />
    <meta property="og:type" content="website" />
    <title>{% block title %}Atharva | ML | WebDev{% endblock %}</title>
    <!-- Theme (load first to prevent flash-of-wrong-theme) -->
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
    <!-- AOS CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <link
      rel="icon"
      type="image/png"
      href="{{ url_for('static', filename='assets/images/profile/letter-a.png') }}" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.css" />
    <link rel="stylesheet"
      href="{{ url_for('static', filename='css/styles.css') }}">
  </head>
  <body>
    <div id="scrollProgress"></div>
    <header>
      {% include "main/partials/navbar.html" %}
    </header>

    {% block hero %}{% endblock %}
    {% block skills %}{% endblock %}
    {% block certificates %}{% endblock %}
    {% block projects %}{% endblock %}
    {% block contact %}{% endblock %}

    <footer class="footer">
      {% include "main/partials/footer.html" %}
    </footer>

    <button id="backToTop" title="Go to top">
      <i class="bi bi-arrow-up"></i>
    </button>
    <!-- AOS JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/typed.js@2.0.16/dist/typed.umd.js"></script>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  </body>
</html>
